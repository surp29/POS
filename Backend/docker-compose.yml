
# ── Shared config ─────────────────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL: postgresql://posuser:pospassword@postgres:5432/posdb
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
  JWT_ACCESS_TOKEN_EXPIRES: ${JWT_ACCESS_TOKEN_EXPIRES:-1800}
  CACHE_TTL_PRODUCTS: ${CACHE_TTL_PRODUCTS:-300}
  FLASK_ENV: ${FLASK_ENV:-production}
  BACKEND_PORT: "5001"
  DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
  SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: posuser
      POSTGRES_PASSWORD: pospassword
      POSTGRES_DB: posdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"       # expose cho dev tool như DBeaver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posuser -d posdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pos_network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pos_network

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: pos_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos_network

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: pos_celery_worker
    restart: unless-stopped
    # Override CMD — chạy Celery thay vì gunicorn
    command: >
      python -m celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/static
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  # Dùng để chạy periodic tasks (vd: cleanup, báo cáo tự động)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: pos_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - celery_worker
    networks:
      - pos_network
    profiles:
      - scheduler    # chỉ chạy khi dùng: docker compose --profile scheduler up

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  pos_network:
    driver: bridge